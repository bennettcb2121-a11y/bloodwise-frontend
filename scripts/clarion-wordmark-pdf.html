<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Source+Sans+3:wght@500&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Mirrors app/globals.css — .clarion-labs-logo--page + light theme */
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        background: #fff;
      }
      body {
        padding: 48px;
      }
      .clarion-labs-logo {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        width: fit-content;
      }
      .clarion-labs-logo-name {
        font-family: "Libre Baskerville", Georgia, "Times New Roman", serif;
        font-weight: 700;
        letter-spacing: -0.03em;
        color: #1a1a1a;
        line-height: 1.08;
        font-size: 28px;
      }
      .clarion-labs-logo-labs {
        font-weight: 600;
        color: color-mix(in srgb, #1a1a1a 88%, #1f6f5b 12%);
      }
      .clarion-labs-logo-tagline {
        font-family: "Source Sans 3", system-ui, sans-serif;
        font-weight: 500;
        letter-spacing: 0.12em;
        text-transform: lowercase;
        font-size: 11px;
        color: rgba(0, 0, 0, 0.52);
        line-height: 1.3;
        margin: 0.3em 0 0;
      }
    </style>
  </head>
  <body>
    <div class="clarion-labs-logo">
      <span class="clarion-labs-logo-name">
        Clarion <span class="clarion-labs-logo-labs">Labs</span>
      </span>
      <span class="clarion-labs-logo-tagline">brilliantly clear</span>
    </div>
  </body>
</html>
